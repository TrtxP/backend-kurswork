<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація користувачів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Реєстрація користувачів</h1>
    <form id="register-form">
        <div class="form">
            <label for="name">Ім'я:</label>
            <input type="text" name="name" id="name" required>
        </div>
        <div class="form">
            <label for="email">Електронна пошта:</label>
            <input type="email" name="email" id="email" required>
        </div>
        <div class="form">
            <label for="password">Пароль:</label>
            <input type="password" name="password" id="password" required>
        </div>
        <div class="form">
            <input type="submit" value="Зарєструватися">
        </div>
    </form><br>
    <a href="login.html">Перейти на сторінку логіну</a><br>
    <a href="get_users.html">Переглянути список користувачів</a><br>
    <a href="index.php">На головну</a>

    <script src="register.js" type="module"></script>
</body>
</html>
